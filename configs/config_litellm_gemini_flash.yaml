# gemini 2.5 flash via local litellm proxy
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: gemini-2.5-flash
model_name: Gemini 2.5 Flash (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_gemini_flash.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
