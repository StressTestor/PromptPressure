# grok-4-1 fast reasoning via local litellm proxy (direct xAI API)
# budget option: 2M context, $0.20/$0.50 per M tokens (50% off in batch)
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: grok-4.20-fast
model_name: Grok 4.1 Fast (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_grok_fast.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
