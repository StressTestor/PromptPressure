# GPT-4o via local litellm proxy (routed through OpenRouter)
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: gpt-4o
model_name: GPT-4o (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_gpt4o.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
