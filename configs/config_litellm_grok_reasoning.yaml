# grok-4.20 reasoning variant via local litellm proxy (direct xAI API)
# flagship model, 2M context, $2/$6 per M tokens (50% off in batch)
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: grok-4.20-reasoning
model_name: Grok 4.20 Reasoning (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_grok_reasoning.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
