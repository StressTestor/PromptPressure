adapter: openrouter
model: z-ai/glm-5.1
model_name: GLM-5.1
is_simulation: false
dataset: evals_dataset.json
output: eval_openrouter_glm_5_1.csv
output_dir: outputs
openrouter_api_key: ""
openrouter_endpoint: https://openrouter.ai/api/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
max_workers: 3
# base timeout 120s. multi-turn ladder scales to 180/240/300/360s per turn.
# GLM-5.1 is slow on long-context multi-turn; default 60s base caused 10 timeouts in pass 1.
timeout: 120
