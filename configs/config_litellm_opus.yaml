# claude opus 4.6 via local litellm proxy
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: claude-opus-4-6
model_name: Claude Opus 4.6 (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_opus.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
