# Llama 3.3 70B via local litellm proxy (routed through OpenRouter)
# start proxy first: scripts/start-litellm.sh
adapter: litellm
model: llama-3.3-70b
model_name: Llama 3.3 70B (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_llama70b.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
tier: full
use_timestamp_output_dir: true
