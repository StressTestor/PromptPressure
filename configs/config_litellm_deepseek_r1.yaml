# deepseek-r1 via local litellm proxy (direct deepseek API, not openrouter)
# start proxy first: scripts/start-litellm.sh
# reasoning tokens captured via litellm adapter's get_last_reasoning()
adapter: litellm
model: deepseek-r1
model_name: DeepSeek R1 (litellm)
is_simulation: false
dataset: evals_dataset.json
output: eval_litellm_deepseek_r1.csv
output_dir: outputs
litellm_endpoint: http://localhost:4000/v1/chat/completions
temperature: 0.7
timeout: 180
tier: full
use_timestamp_output_dir: true
